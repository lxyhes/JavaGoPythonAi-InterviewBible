server:
  port: 8080

spring:
  application:
    name: interview-guide-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:file:./data/interview-guide;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      continue-on-error: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid

iflow:
  enabled: false
  url: ws://localhost:8090/acp
  connection-timeout: 30
  read-timeout: 600
  auto-start-process: false
  cli-path: iflow
  acp-enabled: false
  acp-port: 8090
  log-level: INFO
  max-reconnect-attempts: 3
  reconnect-interval: 5000

jwt:
  secret: mySecretKey12345678901234567890123456789012
  expiration: 86400000

logging:
  level:
    com.interview: INFO
    org.springframework.web: INFO
