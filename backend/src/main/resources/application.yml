server:
  port: 8080

spring:
  application:
    name: interview-guide-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:file:./data/interview-guide;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      continue-on-error: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid

iflow:
  enabled: false # 已切换到原生 AI 接入，此项废弃

ai:
  active-provider: deepseek
  deepseek:
    api-key: "sk-your-key-here" # 请在此处填入你的 DeepSeek API Key
    base-url: "https://api.deepseek.com"
    model: "deepseek-chat"
  openai:
    api-key: ""
    base-url: "https://api.openai.com/v1"
    model: "gpt-3.5-turbo"

jwt:
  secret: mySecretKey12345678901234567890123456789012
  expiration: 86400000

logging:
  level:
    com.interview: INFO
    org.springframework.web: INFO
